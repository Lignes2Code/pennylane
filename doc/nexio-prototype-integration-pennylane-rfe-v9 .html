<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nexio ERP — Prototype intégration Pennylane RFE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --app:#4F46E5;--app-dk:#3730A3;--app-lt:#EEF2FF;--app-200:#C7D2FE;
  --pl:#42AD9A;--pl-dk:#006666;--pl-lt:#D9EFEB;--pl-200:#8ECEC2;
  --n50:#f8fafc;--n100:#f1f5f9;--n200:#e2e8f0;--n300:#cbd5e1;
  --n400:#94a3b8;--n600:#475569;--n800:#1e293b;--n900:#0f172a;
  --w:#FFFFFF;--ok:#22C55E;--warn:#F59E0B;--err:#EF4444
}
html,body{height:100%;font-family:'Manrope',system-ui,sans-serif;font-size:14px;color:var(--n800);background:var(--n50)}
#app-root{display:flex;flex-direction:column;height:100vh;overflow:hidden}
#app-header{display:flex;align-items:center;padding:0 20px;height:52px;background:var(--w);border-bottom:1px solid var(--n200);gap:16px;flex-shrink:0;z-index:10}
.app-logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:17px;color:var(--n900);text-decoration:none}
.logo-icon{width:30px;height:30px;background:var(--app);border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;font-weight:800;font-size:15px;flex-shrink:0}
.app-nav{display:flex;gap:2px;flex:1;justify-content:center}
.app-nav a{padding:5px 12px;border-radius:6px;font-size:13px;font-weight:500;color:var(--n600);text-decoration:none;cursor:pointer}
.app-nav a.active{background:var(--app-lt);color:var(--app);font-weight:700}
.app-nav a:hover:not(.active){background:var(--n100)}
.app-user{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--n600)}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--app-lt);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--app)}
#app-body{display:flex;flex:1;overflow:hidden}
#sidebar{width:196px;background:var(--w);border-right:1px solid var(--n200);padding:10px 8px;flex-shrink:0;display:flex;flex-direction:column;gap:2px}
.sv-sec{font-size:10px;font-weight:700;color:var(--n400);text-transform:uppercase;letter-spacing:.06em;padding:8px 8px 3px;margin-top:4px}
.sv-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;font-size:13px;font-weight:500;color:var(--n600);cursor:pointer}
.sv-item:hover{background:var(--n100)}
.sv-item.active{background:var(--app-lt);color:var(--app);font-weight:700}
.sv-icon{width:18px;text-align:center;font-size:14px}
.sv-spacer{flex:1}
#app-main{flex:1;overflow-y:auto;padding:24px 32px;background:var(--n50)}
#tech-console{height:176px;background:#0f172a;border-top:2px solid var(--app);display:flex;flex-direction:column;flex-shrink:0;transition:height .25s ease}
#tech-console.collapsed{height:34px}
#tc-bar{display:flex;align-items:center;justify-content:space-between;padding:0 14px;height:34px;background:#1e293b;cursor:pointer;flex-shrink:0;user-select:none}
#tc-title{font-size:11px;font-weight:700;color:var(--app);text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;gap:8px}
#tc-dot{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:blink 1.5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
#tc-actions{display:flex;align-items:center;gap:8px}
#tc-clear{background:none;border:1px solid rgba(255,255,255,.1);color:var(--n400);padding:2px 8px;border-radius:4px;font-size:11px;cursor:pointer;font-family:inherit}
#tc-clear:hover{color:white}
#tc-chevron{color:var(--n400);font-size:13px;font-family:monospace}
#tc-body{flex:1;overflow-y:auto;padding:7px 14px;display:flex;flex-direction:column;gap:3px}
.tce{font-family:'JetBrains Mono','Fira Code',monospace;font-size:11.5px;line-height:1.7;padding:2px 8px;border-radius:3px;background:rgba(255,255,255,.03);border-left:3px solid transparent;white-space:pre-wrap;word-break:break-all}
.tce.req{border-color:#818CF8;color:#E2E8F0}
.tce.ok{border-color:#4ADE80;color:#86EFAC}
.tce.err{border-color:#F87171;color:#FCA5A5}
.tce.nfo{border-color:#60A5FA;color:#93C5FD}
.stepper{display:flex;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:4px}
.stp{display:flex;align-items:center;gap:7px}
.stp-n{width:25px;height:25px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.stp-n.done{background:var(--ok);color:white}
.stp-n.cur{background:var(--app);color:white}
.stp-n.wait{background:var(--n200);color:var(--n400)}
.stp-l{font-size:12px;font-weight:600;white-space:nowrap}
.stp-l.done{color:var(--ok)}.stp-l.cur{color:var(--app)}.stp-l.wait{color:var(--n400)}
.stp-line{flex:1;height:2px;min-width:14px;background:var(--n200)}
.stp-line.done{background:var(--ok)}
.sc-head{margin-bottom:20px}
.sc-title{font-size:20px;font-weight:700;color:var(--n900);margin-bottom:4px}
.sc-sub{font-size:13.5px;color:var(--n600)}
.sc-body{max-width:680px}
.pc-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:620px}
.pc-card{background:var(--w);border:2px solid var(--n200);border-radius:12px;padding:24px;cursor:pointer;transition:all .2s}
.pc-card:hover{border-color:var(--app);transform:translateY(-2px);box-shadow:0 8px 28px rgba(79,70,229,.12)}
.pc-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-bottom:12px}
.pb-new{background:var(--app-lt);color:var(--app)}
.pb-ex{background:var(--pl-lt);color:var(--pl-dk)}
.pc-title{font-size:15px;font-weight:700;color:var(--n900);margin-bottom:6px}
.pc-desc{font-size:12.5px;color:var(--n600);line-height:1.55;margin-bottom:14px}
.pc-tags{display:flex;flex-wrap:wrap;gap:5px}
.pc-tag{display:inline-flex;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.pt-app{background:var(--app-lt);color:var(--app)}
.pt-pl{background:var(--pl-lt);color:var(--pl-dk)}
.pt-off{background:var(--n100);color:var(--n400);text-decoration:line-through}
.card{background:var(--w);border:1px solid var(--n200);border-radius:10px;padding:20px;margin-bottom:13px}
.card-head{font-size:14px;font-weight:700;color:var(--n800);margin-bottom:14px;display:flex;align-items:center;gap:7px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fl{display:flex;flex-direction:column;gap:4px}
.fl.full{grid-column:1/-1}
.flabel{font-size:12px;font-weight:600;color:var(--n600)}
.flabel .r{color:var(--err)}
.finput{padding:8px 11px;border:1.5px solid var(--n200);border-radius:7px;font-size:13.5px;font-family:inherit;color:var(--n800);background:var(--w);transition:border-color .15s;width:100%}
.finput:focus{outline:none;border-color:var(--app)}
.pv-list{display:flex;flex-direction:column;gap:10px}
.pv-item{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;background:var(--w);border:1px solid var(--n200);border-radius:8px;transition:all .3s}
.pv-item.run{border-color:var(--app);background:#FAFAFE}
.pv-item.done{border-color:var(--ok);background:#F0FDF4}
.pv-ico{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;font-size:13px;transition:all .3s}
.pv-ico.wait{background:var(--n100);color:var(--n300)}
.pv-ico.spin{background:var(--app-lt);color:var(--app);animation:spin .8s linear infinite}
.pv-ico.ok{background:#DCFCE7;color:#166534}
@keyframes spin{to{transform:rotate(360deg)}}
.pv-label{font-size:13.5px;font-weight:600;color:var(--n800)}
.pv-sub{font-size:12px;color:var(--n400);margin-top:2px}
.pv-chip{display:inline-flex;padding:1px 7px;border-radius:4px;font-size:11.5px;font-weight:700;font-family:monospace;background:var(--n100);color:var(--n600);margin-top:4px}
.wait-card{background:linear-gradient(135deg,var(--pl-dk),var(--pl));border-radius:12px;padding:28px;color:white;margin-bottom:16px}
.wait-title{font-size:16px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:9px}
.wait-desc{font-size:13px;color:rgba(255,255,255,.82);margin-bottom:22px;line-height:1.6}
.wait-steps{display:flex;flex-direction:column;gap:10px}
.wait-row{display:flex;align-items:flex-start;gap:11px;font-size:13px;line-height:1.5}
.wait-num{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}
.wait-indicator{display:flex;align-items:center;gap:10px;padding:13px 16px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:9px;margin-top:22px}
.wait-pulse{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.9);flex-shrink:0;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.85)}}
.wait-indicator-text{font-size:13px;color:rgba(255,255,255,.88)}
.wait-indicator-sub{font-size:11.5px;color:rgba(255,255,255,.6);margin-top:2px}
.demo-nav{display:flex;align-items:center;gap:10px;padding:11px 16px;background:var(--n100);border:1.5px dashed var(--n300);border-radius:9px;margin-top:16px}
.demo-nav-label{font-size:12px;color:var(--n400);font-weight:500;flex:1;line-height:1.4}
.demo-nav-label strong{color:var(--n600);display:block;margin-bottom:2px}
.oa-card{background:var(--w);border:2px solid var(--pl);border-radius:12px;padding:28px;max-width:520px}
.oa-badge{display:inline-flex;align-items:center;gap:7px;background:var(--pl-lt);border:1px solid var(--pl-200);border-radius:8px;padding:7px 13px;margin-bottom:18px}
.oa-dot{width:10px;height:10px;border-radius:50%;background:var(--pl)}
.oa-name{font-size:14px;font-weight:700;color:var(--pl-dk)}
.oa-title{font-size:16px;font-weight:700;color:var(--n900);margin-bottom:5px}
.oa-desc{font-size:13px;color:var(--n600);margin-bottom:16px;line-height:1.55}
.oa-scopes{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.oa-scope{padding:4px 10px;border-radius:5px;background:var(--pl-lt);color:var(--pl-dk);font-size:12px;font-weight:700;font-family:monospace}
.oa-note{font-size:12px;color:var(--n400);margin-bottom:20px}
.oa-btn{width:100%;padding:12px;background:var(--pl);color:white;border:none;border-radius:8px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;transition:background .15s}
.oa-btn:hover:not(:disabled){background:var(--pl-dk)}
.oa-btn:disabled{background:var(--n300);cursor:not-allowed}
.oa-waiting{background:linear-gradient(135deg,#0F3D35,var(--pl-dk));border-radius:10px;padding:20px;color:white;margin-bottom:18px}
.oa-waiting-icon{font-size:28px;margin-bottom:10px}
.oa-waiting-title{font-size:15px;font-weight:700;margin-bottom:6px}
.oa-waiting-sub{font-size:12.5px;color:rgba(255,255,255,.75);line-height:1.6;margin-bottom:16px}
.oa-waiting-pulse{display:flex;align-items:center;gap:9px;padding:10px 14px;background:rgba(255,255,255,.1);border-radius:7px;margin-bottom:16px}
.oa-waiting-dot{width:8px;height:8px;border-radius:50%;background:#4ADE80;flex-shrink:0;animation:pulse 1.5s ease-in-out infinite}
.oa-waiting-pulse-text{font-size:12.5px;color:rgba(255,255,255,.88);font-weight:600}
.oa-sim-btn{width:100%;padding:11px;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);border-radius:8px;font-size:13.5px;font-weight:700;font-family:inherit;cursor:pointer;color:white;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s}
.oa-sim-btn:hover{background:rgba(255,255,255,.25)}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
.stat{background:var(--w);border:1px solid var(--n200);border-radius:9px;padding:16px}
.stat-lbl{font-size:11px;font-weight:700;color:var(--n400);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.stat-val{font-size:24px;font-weight:700;color:var(--n900);margin-bottom:4px}
.sbadge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.sb-ok{background:#DCFCE7;color:#166534}.sb-warn{background:#FEF9EC;color:#92600A}
.dash-acts{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.dash-btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.db-pri{background:var(--app);color:white}.db-pri:hover{background:var(--app-dk)}
.db-sec{background:var(--w);color:var(--n800);border:1.5px solid var(--n200)}.db-sec:hover{background:var(--n50)}
.db-ghost{background:none;color:var(--n400);border:1.5px solid var(--n200)}.db-ghost:hover{color:var(--n800)}
.inv-table{background:var(--w);border:1px solid var(--n200);border-radius:9px;overflow:hidden}
.it-head{display:grid;grid-template-columns:2fr 1.5fr 1.2fr 1fr;padding:9px 16px;background:var(--n50);border-bottom:1px solid var(--n200);font-size:11px;font-weight:700;color:var(--n400);text-transform:uppercase;letter-spacing:.05em}
.it-row{display:grid;grid-template-columns:2fr 1.5fr 1.2fr 1fr;align-items:center;padding:11px 16px;border-bottom:1px solid var(--n100);font-size:13px}
.it-row:last-child{border-bottom:none}
.it-row:hover{background:var(--n50)}
.ist{display:inline-flex;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.ist-sent{background:#DCFCE7;color:#166534}
.ist-recv{background:#EFF6FF;color:#1e40af}
.ist-pend{background:#FEF9EC;color:#92600A}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;border-radius:8px;font-size:13.5px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.btn-app{background:var(--app);color:white}.btn-app:hover{background:var(--app-dk)}
.btn-ghost{background:var(--w);color:var(--n800);border:1.5px solid var(--n200)}.btn-ghost:hover{background:var(--n50)}
.btn-row{display:flex;gap:10px;margin-top:22px;align-items:center}
.callout{display:flex;gap:9px;padding:11px 14px;border-radius:8px;font-size:13px;line-height:1.55;margin-bottom:13px}
.c-ok{background:#F0FDF4;border:1px solid #86EFAC;color:#166534}
.c-info{background:#EFF6FF;border:1px solid #BFDBFE;color:#1e40af}
code{background:var(--n100);padding:1px 5px;border-radius:4px;font-size:12px;font-family:monospace;color:var(--app)}
.txt-sm{font-size:12.5px;color:var(--n600);line-height:1.6}
.mt12{margin-top:12px}
</style>
</head>
<body>
<div id="app-root">
  <header id="app-header">
    <a class="app-logo" href="#">
      <div class="logo-icon">N</div>
      <span>Nexio</span>
    </a>
    <nav class="app-nav">
      <a href="#">Tableau de bord</a>
      <a href="#">Clients</a>
      <a href="#" class="active">Facturation RFE</a>
      <a href="#">Rapports</a>
    </nav>
    <div class="app-user">
      <div class="avatar">TM</div>
      Thomas Martin
    </div>
  </header>
  <div id="app-body">
    <aside id="sidebar">
      <div class="sv-sec">Navigation</div>
      <div class="sv-item"><span class="sv-icon">🏠</span>Accueil</div>
      <div class="sv-item"><span class="sv-icon">👥</span>Clients</div>
      <div class="sv-item active"><span class="sv-icon">⚡</span>Factures RFE</div>
      <div class="sv-item"><span class="sv-icon">📄</span>Rapports</div>
      <div class="sv-spacer"></div>
      <div class="sv-sec">Compte</div>
      <div class="sv-item"><span class="sv-icon">⚙️</span>Paramètres</div>
    </aside>
    <main id="app-main"></main>
  </div>
  <div id="tech-console">
    <div id="tc-bar" onclick="toggleConsole()">
      <div id="tc-title"><div id="tc-dot"></div>Console technique — Appels API Pennylane</div>
      <div id="tc-actions">
        <button id="tc-clear" onclick="event.stopPropagation();clearConsole()">Effacer</button>
        <span id="tc-chevron">▼</span>
      </div>
    </div>
    <div id="tc-body"><div id="tc-log"></div></div>
  </div>
</div>

<script>
/* ─── Constantes ─── */
/* ✏️ v9 : e_invoices:all retiré du scope OAuth */
const OAUTH_URL    = 'https://sandbox.pennylane.com/callbacks/oauth/web?redirect_uri=https%3A%2F%2Fwww.pennylane.com%2Ftesting&state=123456789&response_type=code&scope=customer_invoices%3Aall+supplier_invoices%3Aall&client_id=eryAiNIbq0SRY9i_tPStkvMZBWbPjEYTMfQH6vjT-6U&client_name=D%C3%A9mo+RFE+Partenaire';
const REDIRECT_URI = 'https://www.pennylane.com/testing';
const CLIENT_ID    = 'eryAiNIbq0SRY9i_tPStkvMZBWbPjEYTMfQH6vjT-6U';
/* ✏️ v9 : e_invoices:all retiré */
const SCOPES       = ['customer_invoices:all', 'supplier_invoices:all'];
const PROV_BASE    = 'https://app.pennylane.com/api/external/provisioning/v1';

const CLIENT_ID_MASKED = CLIENT_ID.slice(0, 8) + '••••••••••••' + CLIENT_ID.slice(-4);
const OAUTH_URL_LOG    = OAUTH_URL.replace(CLIENT_ID, CLIENT_ID_MASKED);

const S = { screen:'select', persona:null, uid:null, cid:null, email:'', company:'' };
const M = document.getElementById('app-main');
function go(s){ S.screen=s; render(); }
function render(){ M.innerHTML = SCREENS[S.screen](); }

function stepper(steps, cur){
  return `<div class="stepper">${steps.map((s,i)=>{
    const n=i+1, st=n<cur?'done':n===cur?'cur':'wait';
    return `${i>0?`<div class="stp-line${i<cur-1?' done':''}"></div>`:''}
    <div class="stp"><div class="stp-n ${st}">${st==='done'?'✓':n}</div><span class="stp-l ${st}">${s}</span></div>`;
  }).join('')}</div>`;
}

function scopesHTML(){
  return SCOPES.map(s=>`<span class="oa-scope">${s}</span>`).join('');
}

const SCREENS = {

  select:()=>`
    <div class="sc-head">
      <div class="sc-title">Connecter un client à Pennylane RFE</div>
      <div class="sc-sub">Sélectionnez le scénario correspondant à votre client pour démarrer l'intégration.</div>
    </div>
    <div class="pc-grid">
      <div class="pc-card" onclick="choose('new')">
        <div class="pc-badge pb-new">🆕 Nouveau client</div>
        <div class="pc-title">Créer et connecter un compte</div>
        <div class="pc-desc">L'utilisateur et l'entreprise n'existent pas encore dans Pennylane. Un provisioning complet est nécessaire.</div>
        <div class="pc-tags">
          <span class="pc-tag pt-app">1 Provisioning</span>
          <span class="pc-tag pt-app">2 Config PA</span>
          <span class="pc-tag pt-app">3 OAuth2</span>
          <span class="pc-tag pt-app">4 Flux RFE</span>
        </div>
      </div>
      <div class="pc-card" onclick="choose('existing')">
        <div class="pc-badge pb-ex">🏢 Client existant</div>
        <div class="pc-title">Connecter un compte existant</div>
        <div class="pc-desc">L'utilisateur et l'entreprise existent déjà dans Pennylane. La désignation PA est faite. Il suffit de lancer le flux OAuth2.</div>
        <div class="pc-tags">
          <span class="pc-tag pt-off">1 Provisioning</span>
          <span class="pc-tag pt-off">2 Config PA</span>
          <span class="pc-tag pt-pl">3 OAuth2</span>
          <span class="pc-tag pt-pl">4 Flux RFE</span>
        </div>
      </div>
    </div>
    <div class="txt-sm" style="margin-top:20px;max-width:500px">
      <strong>Prototype interactif</strong> — Simulez les deux parcours d'intégration. La console technique en bas affiche les appels API en temps réel.
    </div>`,

  form:()=>`
    ${stepper(['Informations','Provisioning','Config Pennylane','Connexion OAuth2'],1)}
    <div class="sc-head">
      <div class="sc-title">Informations du client</div>

/* ─── ACTIONS ─── */
function choose(p){
  S.persona=p;
  if(p==='new'){ go('form'); nfo('Persona : Nouveau client — Phases 1 → 4'); }
  else { go('oauth'); nfo('Persona : Client existant — Démarrage Phase 3 (OAuth2)'); nfo('Compte Pennylane existant · Désignation PA déjà effectuée'); }
}

function startProv(){
  S.email=document.getElementById('f-email')?.value||'jean.paul@acme.fr';
  S.company=document.getElementById('f-co')?.value||'ACME SAS';
  const siren=document.getElementById('f-siren')?.value||'123456789';
  const first=document.getElementById('f-first')?.value||'Jean';
  const last=document.getElementById('f-last')?.value||'Paul';
  go('provisioning');
  runProv(S.email,first,last,S.company,siren);
}

function setIco(id,cls,txt){
  const el=document.getElementById(id); if(!el) return;
  const ico=el.querySelector('.pv-ico');
  ico.className=`pv-ico ${cls}`; ico.textContent=txt;
  el.className=`pv-item ${cls==='spin'?'run':cls==='ok'?'done':''}`;
}

/* ─── Provisioning ─── */
function runProv(email,first,last,co,siren){
  const steps=[
    {
      delay:400, id:'pi0',
      log:()=>{
        req('POST','https://app.pennylane.com/oauth/token',
          'grant_type=client_credentials&scope=companies:all+users');
        setTimeout(()=>res(200,'{"access_token":"eyJhbGciOiJSUzI1…","token_type":"Bearer","expires_in":3600}'),600);
      }
    },
    {
      delay:1800, id:'pi1',
      log:()=>{
        req('POST',`${PROV_BASE}/users`,
          JSON.stringify({"user":{"email":email,"first_name":first,"last_name":last}}));
        setTimeout(()=>{
          S.uid=4000+Math.floor(Math.random()*1000);
          res(201,`{"user":{"id":${S.uid},"email":"${email}","first_name":"${first}","last_name":"${last}","invitation_sent":true}}`);
          const b=document.getElementById('uid-badge');
          if(b) b.innerHTML=`<span class="pv-chip">user_id: ${S.uid}</span>`;
        },900);
      }
    },
    {
      delay:3600, id:'pi2',
      log:()=>{
        req('POST',`${PROV_BASE}/companies`,
          JSON.stringify({
            "user_ids":[S.uid],
            "force_pro_account_creation":false,
            "company":{"reg_no":`training-${siren}`,"name":co,"country_alpha2":"FR"}
          }));
        setTimeout(()=>{
          S.cid=9000+Math.floor(Math.random()*1000);
          res(201,`{"company":{"id":${S.cid},"name":"${co}","reg_no":"training-${siren}"}}`);
          const b=document.getElementById('cid-badge');
          if(b) b.innerHTML=`<span class="pv-chip">company_id: ${S.cid}</span>`;
          setTimeout(()=>{ const nx=document.getElementById('pv-next'); if(nx) nx.style.display='flex'; },600);
        },900);
      }
    }
  ];
  steps.forEach(({delay,id,log})=>{
    setTimeout(()=>{ setIco(id,'spin','↻'); log(); }, delay);
    setTimeout(()=>{ setIco(id,'ok','✓'); }, delay+1400);
  });
}

function simReturn(){
  nfo('← Redirection automatique depuis pennylane.com vers redirect_uri');
  nfo('Désignation PA : Émission ✓ · Réception ✓');
  go('oauth');
}

/* ─── OAuth ─── */
function runOAuth(){
  const btn = document.getElementById('oa-btn');
  if(btn){ btn.disabled=true; btn.innerHTML='<span>⏳</span> Ouverture de Pennylane…'; }
  nfo('Démarrage flux OAuth2 · Ouverture de la page d\'autorisation Pennylane');
  req('GET', OAUTH_URL_LOG);
  window.open(OAUTH_URL, '_blank');
  setTimeout(()=>{
    const card = document.getElementById('oa-card');
    if(!card) return;
    card.innerHTML = `
      <div class="oa-badge">
        <div class="oa-dot"></div>
        <span class="oa-name">Pennylane</span>
        <span style="font-size:12px;color:var(--n400);margin-left:4px">— Page d'autorisation ouverte</span>
      </div>
      <div class="oa-waiting">
        <div class="oa-waiting-icon">🔐</div>
        <div class="oa-waiting-title">En attente de votre autorisation sur Pennylane</div>
        <div class="oa-waiting-sub">
          La page d'autorisation Pennylane s'est ouverte dans un nouvel onglet.<br>
          Connectez-vous à votre compte sandbox, puis cliquez sur <strong>« Autoriser »</strong>.
          Pennylane vous redirigera ensuite vers <code style="background:rgba(255,255,255,.15);padding:1px 5px;border-radius:3px;color:white">${REDIRECT_URI}</code>
        </div>
        <div class="oa-waiting-pulse">
          <div class="oa-waiting-dot"></div>
          <span class="oa-waiting-pulse-text">En attente du callback <code style="background:rgba(255,255,255,.15);padding:1px 5px;border-radius:3px;color:white">?code=…&state=123456789</code></span>
        </div>
        <button class="oa-sim-btn" onclick="simulateCallback()">↩ Simuler le retour callback (redirect_uri)</button>
      </div>
      <div class="txt-sm" style="margin-top:10px">
        Une fois l'autorisation accordée, Pennylane rappelle votre serveur avec un <code>code</code> d'autorisation.
        Nexio échange ce code contre un <code>access_token</code> via <code>POST /oauth/token</code>.
      </div>`;
    nfo('Onglet Pennylane ouvert · En attente de l\'autorisation utilisateur…');
  }, 600);
}

function simulateCallback(){
  const fakeCode  = 'rfe_' + Math.random().toString(36).slice(2,14);
  const fakeState = '123456789';
  nfo('← Callback reçu depuis pennylane.com');
  nfo(`redirect_uri → ${REDIRECT_URI}?code=${fakeCode}&state=${fakeState}`);
  nfo(`Vérification state : ${fakeState} ✓ (correspond à la valeur initiale)`);
  req('POST','https://app.pennylane.com/oauth/token',
    `grant_type=authorization_code&code=${fakeCode}&redirect_uri=${REDIRECT_URI}&client_id=${CLIENT_ID_MASKED}&client_secret={{CLIENT_SECRET}}`);
  setTimeout(()=>{
    res(200, JSON.stringify({access_token:'eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9…',token_type:'Bearer',expires_in:86400,refresh_token:'eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9_refresh…',scope:SCOPES.join(' ')}));
    nfo('✅ access_token stocké côté Nexio · Durée : 24h · refresh_token : 90 jours');
    nfo(`Scopes accordés : ${SCOPES.join(' · ')}`);
    if(S.persona==='existing'){ S.company='Startup SAS'; }
    setTimeout(()=>go('dashboard'), 900);
  }, 1000);
}

function reset(){
  S.screen='select';S.persona=null;S.uid=null;S.cid=null;S.email='';S.company='';
  render(); nfo('─── Démo réinitialisée ───');
}

/* ─── Console ─── */
let consoleOpen=true;
function toggleConsole(){
  consoleOpen=!consoleOpen;
  document.getElementById('tech-console').classList.toggle('collapsed',!consoleOpen);
  document.getElementById('tc-chevron').textContent=consoleOpen?'▼':'▲';
}
function clearConsole(){ document.getElementById('tc-log').innerHTML=''; }
function log(cls,html){ const el=document.getElementById('tc-log');const d=document.createElement('div');d.className=`tce ${cls}`;d.innerHTML=html;el.appendChild(d);el.scrollTop=el.scrollHeight; }
function req(method,url,body){ log('req',`<span style="color:#818CF8;font-weight:700">${method||'GET'}</span> <span style="color:#FDE68A">${url}</span>${body?'\n<span style="color:#64748B">  '+body+'</span>':''}`); }
function res(status,body){ const ok=status<400; log(ok?'ok':'err',`<span style="font-weight:700;color:${ok?'#4ADE80':'#F87171'}">${status} ${ok?'OK':'ERROR'}</span> <span style="color:#64748B">${body}</span>`); }
function nfo(msg){ log('nfo',`<span style="color:#60A5FA">ℹ</span> <span style="color:#93C5FD">${msg}</span>`); }

render();
nfo('Nexio ERP — Prototype intégration Pennylane RFE v9');
nfo('API Provisioning · https://app.pennylane.com/api/external/provisioning/v1');
nfo(`OAuth2 client_id : ${CLIENT_ID_MASKED}`);
nfo(`Scopes RFE : ${SCOPES.join(' · ')}`);
</script>
